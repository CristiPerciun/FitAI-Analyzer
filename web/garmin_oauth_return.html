<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Auth</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #1f2937;
    }
    .card {
      width: min(92vw, 420px);
      text-align: center;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 8px;
    }
    p {
      color: #4b5563;
      margin: 0;
      line-height: 1.45;
    }
    .spacer {
      height: 14px;
    }
    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Collegamento Garmin in corso...</h1>
    <p id="detail">Attendi qualche secondo mentre completo l'autenticazione.</p>
    <div class="spacer"></div>
    <a id="backLink" class="button" href="/" style="display:none;">Torna all'app</a>
  </div>
  <script>
    (function () {
      console.log(
        '[GarminOAuthReturn]',
        'entry href=', window.location.href,
        'search=', window.location.search,
        'hash=', window.location.hash
      );
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash ? window.location.hash.substring(1) : '';
      var fragmentParams = new URLSearchParams(hash);
      var ticket = params.get('ticket') || '';
      var error = params.get('error') || '';
      var stateVal = (params.get('state') || '').trim();
      var gxApi = (params.get('gx_api') || '').trim();
      var uid =
        params.get('uid') ||
        fragmentParams.get('uid') ||
        sessionStorage.getItem('garmin_oauth_uid') ||
        '';
      var baseUrl =
        params.get('base_url') ||
        fragmentParams.get('base_url') ||
        sessionStorage.getItem('garmin_oauth_base_url') ||
        '';
      var authHeader =
        fragmentParams.get('auth') ||
        sessionStorage.getItem('garmin_oauth_auth') ||
        '';
      var isIosPopup = fragmentParams.get('ios_popup') === '1';
      var appUrl = window.location.origin + '/';
      function buildOAuthPayload() {
        return JSON.stringify({
          type: 'garmin_oauth_result',
          ticket: ticket,
          ticket_or_url: window.location.href,
          error: error,
        });
      }
      var titleEl = document.getElementById('title');
      var detailEl = document.getElementById('detail');
      var backLinkEl = document.getElementById('backLink');

      function normalizeGxApi(raw) {
        if (!raw || typeof raw !== 'string') return '';
        var s = raw.trim();
        while (s.endsWith('/')) s = s.slice(0, -1);
        return s;
      }

      function setStatus(title, detail, showBackLink) {
        titleEl.textContent = title;
        detailEl.textContent = detail;
        backLinkEl.href = appUrl;
        backLinkEl.style.display = showBackLink ? 'inline-block' : 'none';
      }

      function clearOAuthContext() {
        sessionStorage.removeItem('garmin_oauth_uid');
        sessionStorage.removeItem('garmin_oauth_base_url');
        sessionStorage.removeItem('garmin_oauth_auth');
      }

      function storeResult(success, message) {
        sessionStorage.setItem('garmin_oauth_result', success ? 'success' : 'error');
        if (message && message.length) {
          sessionStorage.setItem('garmin_oauth_message', message);
        } else {
          sessionStorage.removeItem('garmin_oauth_message');
        }
      }

      function closeOrReturn(delayMs) {
        console.log('[GarminOAuthReturn]', 'closeOrReturn delayMs=', delayMs, 'isIosPopup=', isIosPopup);
        setTimeout(function () {
          try {
            window.close();
          } catch (e) {}

          try {
            window.open('', '_self');
            window.close();
          } catch (e) {}
        }, delayMs);

        setTimeout(function () {
          console.log('[GarminOAuthReturn]', 'fallback replace ->', appUrl);
          window.location.replace(appUrl);
        }, delayMs + (isIosPopup ? 1200 : 300));
      }

      function serverMessage(data, fallback) {
        if (!data || typeof data !== 'object') return fallback;
        if (typeof data.message === 'string' && data.message) return data.message;
        if (typeof data.detail === 'string' && data.detail) return data.detail;
        return fallback;
      }

      function fetchFailureHint(err) {
        var s = String(err || '');
        if (
          s.indexOf('Failed to fetch') >= 0 ||
          s.indexOf('NetworkError') >= 0 ||
          s.indexOf('Load failed') >= 0
        ) {
          return (
            ' Connessione bloccata dal browser: da HTTPS serve mini-server raggiungibile via HTTPS ' +
            '(mixed content). Verifica GARMIN_SERVER_URL_REMOTE e PUBLIC_SERVER_URL sul Pi.'
          );
        }
        return '';
      }

      async function exchangeTicketWithState(state, gxOrigin) {
        gxOrigin = normalizeGxApi(gxOrigin);
        console.log(
          '[GarminOAuthReturn]',
          'exchangeTicketWithState ticketLen=',
          ticket ? ticket.length : 0,
          'stateLen=',
          state.length,
          'gxOrigin=',
          gxOrigin ? '(ok)' : '(mancante)'
        );
        if (error) {
          clearOAuthContext();
          storeResult(false, 'Garmin: ' + error);
          setStatus('Autenticazione Garmin non riuscita', error, true);
          closeOrReturn(900);
          return;
        }
        if (!ticket) {
          console.warn('[GarminOAuthReturn]', 'Nessun ticket dopo redirect Garmin');
          clearOAuthContext();
          storeResult(false, 'Ticket Garmin mancante nella pagina di ritorno.');
          setStatus(
            'Ticket Garmin mancante',
            'Non ho ricevuto il token da Garmin. Torna all app e riprova.',
            true
          );
          return;
        }
        if (!state || gxOrigin.indexOf('https://') !== 0) {
          clearOAuthContext();
          storeResult(false, 'Contesto OAuth Garmin incompleto (state / gx_api).');
          setStatus(
            'Configurazione OAuth incompleta',
            'Aggiorna app e garmin-sync-server (PUBLIC_SERVER_URL).',
            true
          );
          return;
        }

        setStatus(
          'Salvataggio token Garmin...',
          'Ho intercettato il ticket. Sto completando il collegamento.',
          false
        );

        var headers = { 'Content-Type': 'application/json' };
        if (authHeader) headers['Authorization'] = authHeader;

        var exchangeUrl =
          gxOrigin + '/garmin/connect3/exchange-ticket-with-state';
        try {
          console.log('[GarminOAuthReturn]', 'POST', exchangeUrl);
          var response = await fetch(exchangeUrl, {
            method: 'POST',
            headers: headers,
            mode: 'cors',
            credentials: 'omit',
            body: JSON.stringify({
              state: state,
              ticket_or_url: window.location.href,
            }),
          });
          var raw = await response.text();
          console.log(
            '[GarminOAuthReturn]',
            'exchange-with-state status=',
            response.status,
            'bodyLen=',
            raw ? raw.length : 0
          );
          var data = {};
          if (raw) {
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.warn('[GarminOAuthReturn]', 'risposta non JSON', e);
            }
          }
          clearOAuthContext();
          if (response.ok && data && data.success === true) {
            storeResult(true, 'Garmin collegato.');
            setStatus(
              'Garmin collegato',
              'Token salvato correttamente. Torno all app...',
              false
            );
            closeOrReturn(250);
            return;
          }
          var message = serverMessage(
            data,
            'Exchange Garmin non riuscito (HTTP ' + response.status + ').'
          );
          storeResult(false, message);
          setStatus('Collegamento Garmin non riuscito', message, true);
          closeOrReturn(1200);
        } catch (e) {
          console.error('[GarminOAuthReturn]', 'exchange-with-state errore', e);
          clearOAuthContext();
          var hint = fetchFailureHint(e);
          storeResult(false, 'Errore di rete durante il salvataggio del token Garmin.' + hint);
          setStatus(
            'Errore di rete',
            'Non sono riuscito a raggiungere il mini-server Garmin.' + hint,
            true
          );
        }
      }

      async function exchangeTicketLegacyUidBaseUrl() {
        console.log(
          '[GarminOAuthReturn]',
          'exchangeTicketLegacy ticket=',
          ticket ? '(len ' + ticket.length + ')' : '(mancante)',
          'uid=',
          uid ? '(ok)' : '(mancante)',
          'baseUrl=',
          baseUrl || '(mancante)'
        );
        if (error) {
          clearOAuthContext();
          storeResult(false, 'Garmin: ' + error);
          setStatus('Autenticazione Garmin non riuscita', error, true);
          closeOrReturn(900);
          return;
        }

        if (!ticket) {
          console.warn('[GarminOAuthReturn]', 'Nessun ticket in query');
          clearOAuthContext();
          storeResult(false, 'Ticket Garmin mancante nella pagina di ritorno.');
          setStatus(
            'Ticket Garmin mancante',
            'Non ho ricevuto il token da Garmin. Torna all app e riprova.',
            true
          );
          return;
        }

        if (!uid || !baseUrl) {
          console.error('[GarminOAuthReturn]', 'Legacy: uid o baseUrl assenti');
          clearOAuthContext();
          storeResult(false, 'Contesto OAuth Garmin mancante.');
          setStatus(
            'Contesto Garmin mancante',
            'Non ho trovato uid/base URL nel redirect. Aggiorna l app.',
            true
          );
          return;
        }

        setStatus(
          'Salvataggio token Garmin...',
          'Ho intercettato il ticket. Sto completando il collegamento.',
          false
        );

        var headers = { 'Content-Type': 'application/json' };
        if (authHeader) headers['Authorization'] = authHeader;

        var exchangeUrl = normalizeGxApi(baseUrl) + '/garmin/connect3/exchange-ticket';
        try {
          console.log('[GarminOAuthReturn]', 'POST legacy', exchangeUrl);
          var response = await fetch(exchangeUrl, {
            method: 'POST',
            headers: headers,
            mode: 'cors',
            credentials: 'omit',
            body: JSON.stringify({
              uid: uid,
              ticket_or_url: window.location.href,
            }),
          });

          var raw = await response.text();
          var data = {};
          if (raw) {
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.warn('[GarminOAuthReturn]', 'risposta non JSON', e);
            }
          }

          clearOAuthContext();

          if (response.ok && data && data.success === true) {
            storeResult(true, 'Garmin collegato.');
            setStatus(
              'Garmin collegato',
              'Token salvato correttamente. Torno all app...',
              false
            );
            closeOrReturn(250);
            return;
          }

          var message = serverMessage(
            data,
            'Exchange ticket Garmin non riuscito (HTTP ' + response.status + ').'
          );
          storeResult(false, message);
          setStatus('Collegamento Garmin non riuscito', message, true);
          closeOrReturn(1200);
        } catch (e) {
          console.error('[GarminOAuthReturn]', 'fetch legacy errore', e);
          clearOAuthContext();
          var hint = fetchFailureHint(e);
          storeResult(false, 'Errore di rete durante il salvataggio del token Garmin.' + hint);
          setStatus(
            'Errore di rete',
            'Non sono riuscito a salvare il token Garmin.' + hint,
            true
          );
        }
      }

      async function runInPageExchange() {
        var gxNorm = normalizeGxApi(gxApi);
        if (stateVal && gxNorm.indexOf('https://') === 0) {
          console.log('[GarminOAuthReturn]', 'branch state+gx_api (OAuth web attuale)');
          await exchangeTicketWithState(stateVal, gxNorm);
          return;
        }
        console.log('[GarminOAuthReturn]', 'branch legacy uid+base_url');
        await exchangeTicketLegacyUidBaseUrl();
      }

      /* Popup (anche iPhone / PWA): la finestra principale resta sull'app; opener riceve il ticket. */
      try {
        var opener = window.opener;
        if (opener && !opener.closed) {
          console.log('[GarminOAuthReturn]', 'opener presente -> postMessage (popup SSO)');
          opener.postMessage(buildOAuthPayload(), window.location.origin);
          try {
            window.close();
          } catch (eClose) {}
          setTimeout(function () {
            if (!window.closed) {
              window.location.replace(
                window.location.origin + '/' + window.location.search
              );
            }
          }, 800);
          return;
        }
      } catch (eOpener) {}

      /* Full-page / Safari senza opener: exchange nella pagina */
      runInPageExchange().catch(function (e) {
        console.error('[GarminOAuthReturn]', 'runInPageExchange', e);
      });
    })();
  </script>
</body>
</html>
