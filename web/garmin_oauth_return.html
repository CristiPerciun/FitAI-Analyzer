<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Auth</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #1f2937;
    }
    .card {
      width: min(92vw, 420px);
      text-align: center;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 8px;
    }
    p {
      color: #4b5563;
      margin: 0;
      line-height: 1.45;
    }
    .spacer {
      height: 14px;
    }
    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Collegamento Garmin in corso...</h1>
    <p id="detail">Attendi qualche secondo mentre completo l'autenticazione.</p>
    <div class="spacer"></div>
    <a id="backLink" class="button" href="/" style="display:none;">Torna all'app</a>
  </div>
  <script>
    (function () {
      console.log(
        '[GarminOAuthReturn]',
        'entry href=', window.location.href,
        'search=', window.location.search,
        'hash=', window.location.hash
      );
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash ? window.location.hash.substring(1) : '';
      var fragmentParams = new URLSearchParams(hash);
      var ticket = params.get('ticket') || '';
      var error = params.get('error') || '';
      var uid = fragmentParams.get('uid') || params.get('uid') || sessionStorage.getItem('garmin_oauth_uid') || '';
      var baseUrl = fragmentParams.get('base_url') || sessionStorage.getItem('garmin_oauth_base_url') || '';
      var authHeader = fragmentParams.get('auth') || sessionStorage.getItem('garmin_oauth_auth') || '';
      var isIosPopup = fragmentParams.get('ios_popup') === '1';
      var appUrl = window.location.origin + '/';
      var payload = JSON.stringify({ type: 'garmin_oauth_result', ticket: ticket, error: error });
      var titleEl = document.getElementById('title');
      var detailEl = document.getElementById('detail');
      var backLinkEl = document.getElementById('backLink');

      function setStatus(title, detail, showBackLink) {
        titleEl.textContent = title;
        detailEl.textContent = detail;
        backLinkEl.href = appUrl;
        backLinkEl.style.display = showBackLink ? 'inline-block' : 'none';
      }

      function clearOAuthContext() {
        sessionStorage.removeItem('garmin_oauth_uid');
        sessionStorage.removeItem('garmin_oauth_base_url');
        sessionStorage.removeItem('garmin_oauth_auth');
      }

      function storeResult(success, message) {
        sessionStorage.setItem('garmin_oauth_result', success ? 'success' : 'error');
        if (message && message.length) {
          sessionStorage.setItem('garmin_oauth_message', message);
        } else {
          sessionStorage.removeItem('garmin_oauth_message');
        }
      }

      function closeOrReturn(delayMs) {
        console.log('[GarminOAuthReturn]', 'closeOrReturn delayMs=', delayMs, 'isIosPopup=', isIosPopup);
        setTimeout(function () {
          try {
            window.close();
          } catch (e) {}

          try {
            window.open('', '_self');
            window.close();
          } catch (e) {}
        }, delayMs);

        setTimeout(function () {
          console.log('[GarminOAuthReturn]', 'fallback replace ->', appUrl);
          window.location.replace(appUrl);
        }, delayMs + (isIosPopup ? 1200 : 300));
      }

      function serverMessage(data, fallback) {
        if (!data || typeof data !== 'object') return fallback;
        if (typeof data.message === 'string' && data.message) return data.message;
        if (typeof data.detail === 'string' && data.detail) return data.detail;
        return fallback;
      }

      async function exchangeTicketInReturnPage() {
        console.log(
          '[GarminOAuthReturn]',
          'exchangeTicketInReturnPage ticket=', ticket ? '(len ' + ticket.length + ')' : '(mancante)',
          'error=', error || '(nessuno)',
          'uid=', uid ? '(ok)' : '(mancante)',
          'baseUrl=', baseUrl || '(mancante)'
        );
        if (error) {
          clearOAuthContext();
          storeResult(false, 'Garmin: ' + error);
          setStatus('Autenticazione Garmin non riuscita', error, true);
          closeOrReturn(900);
          return;
        }

        if (!ticket) {
          console.warn('[GarminOAuthReturn]', 'Nessun ticket in query: Garmin non ha rediretto al service oppure param diverso');
          clearOAuthContext();
          storeResult(false, 'Ticket Garmin mancante nella pagina di ritorno.');
          setStatus(
            'Ticket Garmin mancante',
            'Non ho ricevuto il token da Garmin. Torna all app e riprova.',
            true
          );
          return;
        }

        if (!uid || !baseUrl) {
          console.error('[GarminOAuthReturn]', 'Contesto mancante: uid o baseUrl assenti (sessionStorage nel popup?)');
          clearOAuthContext();
          storeResult(false, 'Contesto OAuth Garmin mancante su iOS.');
          setStatus(
            'Contesto Garmin mancante',
            'Non ho trovato le informazioni necessarie per salvare il token.',
            true
          );
          return;
        }

        setStatus(
          'Salvataggio token Garmin...',
          'Ho intercettato il ticket. Sto completando il collegamento.',
          false
        );

        var headers = { 'Content-Type': 'application/json' };
        if (authHeader) {
          headers['Authorization'] = authHeader;
        }

        var exchangeUrl = baseUrl + '/garmin/connect3/exchange-ticket';
        try {
          console.log('[GarminOAuthReturn]', 'POST', exchangeUrl, 'ticket_or_url len=', window.location.href.length);
          var response = await fetch(exchangeUrl, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({
              uid: uid,
              ticket_or_url: window.location.href
            })
          });

          var raw = await response.text();
          console.log(
            '[GarminOAuthReturn]',
            'exchange response status=', response.status,
            'bodyLen=', raw ? raw.length : 0
          );
          var data = {};
          if (raw) {
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.warn('[GarminOAuthReturn]', 'risposta non JSON', e);
            }
          }

          clearOAuthContext();

          if (response.ok && data && data.success === true) {
            console.log('[GarminOAuthReturn]', 'exchange OK');
            storeResult(true, 'Garmin collegato.');
            setStatus(
              'Garmin collegato',
              'Token salvato correttamente. Torno all app...',
              false
            );
            closeOrReturn(250);
            return;
          }

          var message = serverMessage(
            data,
            'Exchange ticket Garmin non riuscito (HTTP ' + response.status + ').'
          );
          console.error('[GarminOAuthReturn]', 'exchange fallito', message);
          storeResult(false, message);
          setStatus('Collegamento Garmin non riuscito', message, true);
          closeOrReturn(1200);
        } catch (e) {
          console.error('[GarminOAuthReturn]', 'fetch exchange errore', e);
          clearOAuthContext();
          storeResult(false, 'Errore di rete durante il salvataggio del token Garmin.');
          setStatus(
            'Errore di rete',
            'Non sono riuscito a salvare il token Garmin. Torna all app e riprova.',
            true
          );
        }
      }

      /* ── Rilevamento iOS (iPhone / iPad / iPod) ─────────────────────────────
         Desktop / Android: popup + postMessage.
         iOS PWA: popup script-opened -> exchange nella return page -> window.close().
         Se iOS non permette la chiusura, fallback: la popup torna almeno all'URL app. */
      var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());

      if (!isIos) {
        /* ── Desktop / Android: popup + postMessage ─────────────────────────── */
        try {
          var opener = window.opener;
          console.log('[GarminOAuthReturn]', 'desktop branch opener=', opener ? 'presente' : 'assente', 'closed=', opener ? opener.closed : 'n/a');
          if (opener && !opener.closed) {
            console.log('[GarminOAuthReturn]', 'postMessage verso opener origin=', window.location.origin);
            opener.postMessage(payload, window.location.origin);
            window.close();
            /* Fallback: se window.close() non chiude (tab non aperto da script)
               aspetta 800 ms e reindirizza full-page. */
            setTimeout(function () {
              if (!window.closed) {
                window.location.replace(
                  window.location.origin + '/' + window.location.search
                );
              }
            }, 800);
            return;
          }
        } catch (e) {}
      }

      /* ── iOS o nessun opener: exchange diretto nella return page ──────────── */
      console.log('[GarminOAuthReturn]', 'branch iOS o senza opener -> exchange in-page');
      exchangeTicketInReturnPage();
    })();
  </script>
</body>
</html>
