<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Auth</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; }
    p { color: #555; }
  </style>
</head>
<body>
  <p>Collegamento Garmin in corso…</p>
  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var ticket  = params.get('ticket') || '';
      var error   = params.get('error')  || '';
      var payload = JSON.stringify({ type: 'garmin_oauth_result', ticket: ticket, error: error });

      /* Caso 1 – popup desktop: notifica il parent via postMessage e chiudi */
      var sentOk = false;
      try {
        var opener = window.opener;
        if (opener && !opener.closed) {
          opener.postMessage(payload, window.location.origin);
          sentOk = true;
          window.close();
          /* Fallback: se window.close() non ha effetto (es. tab non aperto da script)
             aspettiamo 800 ms; se la pagina è ancora aperta facciamo il redirect full-page. */
          setTimeout(function () {
            if (!window.closed) {
              window.location.replace(window.location.origin + '/' + window.location.search);
            }
          }, 800);
          return;
        }
      } catch (e) {}

      /* Caso 2 – full-page (iOS PWA o popup bloccato): torna al root dell'app con ?ticket= */
      window.location.replace(window.location.origin + '/' + window.location.search);
    })();
  </script>
</body>
</html>
