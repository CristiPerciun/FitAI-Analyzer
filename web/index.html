<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Safari / iOS PWA: area sopra safe zone (Dynamic Island, notch) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <!-- theme-color senza media: su PWA iOS (Chrome) i meta con media possono essere ignorati;
       lo script sotto + Flutter impostano il colore in base al tema salvato nell’app. -->
  <meta name="theme-color" content="#F5F3F0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- black-translucent: la barra di stato è trasparente; il colore sotto viene da html/body (evita fascia chiara con tema scuro) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="fitai_analyzer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fitai_analyzer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #1C1C1E; }
    }
    @media (prefers-color-scheme: light) {
      html, body { background-color: #F5F3F0; }
    }
    /* Renderer CanvasKit / fallback: niente “buchi” bianchi attorno al canvas */
    flt-scene-host, flt-glass-pane, flutter-view {
      background-color: transparent;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var dark = '#1C1C1E';
      var light = '#F5F3F0';
      function paint(c, scheme) {
        document.documentElement.style.backgroundColor = c;
        if (document.body) document.body.style.backgroundColor = c;
        document.documentElement.style.setProperty('color-scheme', scheme);
        document.querySelectorAll('meta[name="theme-color"]').forEach(function (n) { n.remove(); });
        var m = document.createElement('meta');
        m.setAttribute('name', 'theme-color');
        m.setAttribute('content', c);
        document.head.appendChild(m);
      }
      function systemDark() {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      try {
        var raw = localStorage.getItem('flutter.theme_mode');
        if (raw != null) {
          var v = JSON.parse(raw);
          if (v === 1) return paint(dark, 'dark');
          if (v === 0) return paint(light, 'light');
          if (v === 2) return paint(systemDark() ? dark : light, systemDark() ? 'dark' : 'light');
        }
        return paint(systemDark() ? dark : light, systemDark() ? 'dark' : 'light');
      } catch (e) {
        paint(systemDark() ? dark : light, systemDark() ? 'dark' : 'light');
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
