<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Safari / iOS PWA: area sopra safe zone (Dynamic Island, notch) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <!-- Valore iniziale (= tinta alta del gradiente app); lo script in body allinea al tema app (localStorage) -->
  <meta name="theme-color" content="#FCEFE2">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- black-translucent: unico valore che rende il contenuto edge-to-edge SOTTO la
       Dynamic Island (in entrambi i temi). default/black riservano invece una fascia
       opaca. iOS lo legge SOLO al lancio (non modificabile a runtime) → sempre fisso. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="fitai_analyzer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fitai_analyzer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #202023; }
    }
    @media (prefers-color-scheme: light) {
      html, body { background-color: #FCEFE2; }
    }
    /* Renderer CanvasKit / fallback: niente “buchi” bianchi attorno al canvas */
    flt-scene-host, flt-glass-pane, flutter-view {
      background-color: transparent;
    }
  </style>
</head>
<body>
  <script>
    window.__FITAI_GARMIN_PUBLIC_API__ = 'https://myrasberrysyncgar.duckdns.org';
    window.__FITAI_WEB_APP_PUBLIC_BASE__ = 'https://cristiperciun.github.io/FitAI-Analyzer/';
  </script>
  <script>
    // GitHub Pages + Flutter PWA: un vecchio service worker può servire un bundle
    // stale (`main.dart.js`) anche dopo il deploy, causando doppi flussi OAuth.
    // L'app non ha bisogno dell'offline cache: rimuoviamo SW e cache web.
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    })();
  </script>
  <script>
    (function () {
      var darkBg = '#202023';
      var lightBg = '#FCEFE2';
      function effectiveDark() {
        try {
          var raw = localStorage.getItem('flutter.theme_mode');
          if (raw != null) {
            var v = JSON.parse(raw);
            if (v === 1) return true;
            if (v === 0) return false;
          }
        } catch (e) {}
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      var dark = effectiveDark();
      var bg = dark ? darkBg : lightBg;
      document.documentElement.style.backgroundColor = bg;
      if (document.body) document.body.style.backgroundColor = bg;
      document.documentElement.style.setProperty('color-scheme', dark ? 'dark' : 'light');
      document.querySelectorAll('meta[name="theme-color"]').forEach(function (n) { n.remove(); });
      var tm = document.createElement('meta');
      tm.setAttribute('name', 'theme-color');
      tm.setAttribute('content', bg);
      document.head.appendChild(tm);
      // Sempre black-translucent: unico valore iOS che fa il contenuto edge-to-edge
      // sotto la Dynamic Island. La leggibilità delle icone (bianche) in tema chiaro
      // è gestita lato Flutter con un velo scuro dietro la status bar.
      var apple = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (apple) apple.setAttribute('content', 'black-translucent');
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
