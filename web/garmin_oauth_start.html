<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Auth Start</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #1f2937;
    }
    .card {
      width: min(92vw, 420px);
      text-align: center;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10);
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 8px;
    }
    p {
      color: #4b5563;
      margin: 0;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Apertura Garmin...</h1>
    <p>Sto preparando l'autenticazione Garmin.</p>
  </div>
  <script>
    (function () {
      var hash = window.location.hash ? window.location.hash.substring(1) : '';
      var params = new URLSearchParams(hash);
      var uid = params.get('uid') || '';
      var baseUrl = params.get('base_url') || '';
      var auth = params.get('auth') || '';
      var ssoUrl = params.get('sso_url') || '';

      if (uid) sessionStorage.setItem('garmin_oauth_uid', uid);
      if (baseUrl) sessionStorage.setItem('garmin_oauth_base_url', baseUrl);
      if (auth) {
        sessionStorage.setItem('garmin_oauth_auth', auth);
      } else {
        sessionStorage.removeItem('garmin_oauth_auth');
      }

      if (!ssoUrl) {
        document.body.innerHTML =
          '<div class="card"><h1>Errore Garmin</h1><p>URL Garmin mancante.</p></div>';
        return;
      }

      window.location.replace(ssoUrl);
    })();
  </script>
</body>
</html>
