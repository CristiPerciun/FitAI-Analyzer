name: Build Web (PWA) e GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup .env per CI
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: false

      - name: Flutter pub get
        run: flutter pub get

      # Project Pages: https://<owner>.github.io/<repo>/
      - name: Build web release
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload artefatto (download manuale)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FitAI-Analyzer-web
          path: build/web

      # Richiesto dal flusso Pages ufficiale (senza questo il deploy può non pubblicare nulla)
      - name: Configura GitHub Pages
        uses: actions/configure-pages@v4

      - name: Prepara deploy GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
