name: Build iOS per iPhone

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup .env per CI
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          # Se .env non esiste, Flutter fallisce nel bundling asset. Creiamo sempre il file.

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: false

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (senza firma - per Apple ID gratuito)
        run: flutter build ios --release --no-codesign

      - name: Crea file IPA
        run: |
          RUNNER_APP=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$RUNNER_APP" ]; then
            echo "Runner.app non trovato. Contenuto build/ios:"
            find build/ios -type f -o -type d | head -50
            exit 1
          fi
          mkdir -p Payload
          cp -r "$RUNNER_APP" Payload/
          zip -r Payload.ipa Payload
          echo "Struttura IPA (Payload/Runner.app):"
          unzip -l Payload.ipa | head -20

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FitAI-Analyzer-iOS
          path: Payload.ipa
